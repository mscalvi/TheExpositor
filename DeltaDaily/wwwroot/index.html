<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#03173d" />
    <title>DeltaDaily</title>
    <base href="/" />
    <link href="css/app.css?v=2" rel="stylesheet" />
    <link href="DeltaDaily.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
    <script src="_content/Blazor.IndexedDB/indexedDb.Blazor.js"></script>
    <script src="js/daily-autosave.js"></script>
    <script>
        window.downloadBytes = (filename, mime, bytes) => {
            const blob = new Blob([new Uint8Array(bytes)], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
        };
    </script>
    <script>
        window.downloadFile = function (fileName, contentType, base64Data) {
            const link = document.createElement('a');
            link.download = fileName;
            link.href = "data:" + contentType + ";base64," + base64Data;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        window.readSelectedJsonFile = function () {
            return new Promise((resolve) => {
                const input = document.querySelector('input[type=file][accept="application/json"]');
                if (!input || !input.files || input.files.length === 0) {
                    resolve("");
                    return;
                }
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result || "");
                reader.onerror = () => resolve("");
                reader.readAsText(file, 'utf-8');
                input.value = "";
            });
        };
    </script>

</body>

</html>
